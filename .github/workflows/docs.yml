name: docs

on:
  pull_request:
  push:
    branches: [main, foxy, humble]

jobs:
  build-docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build HTML (warnings as errors)
        run: uv run sphinx-build -W --keep-going -b html . _build/html
      - name: Link check
        # Non-blocking: external links break over time and shouldn't fail the build.
        continue-on-error: true
        run: uv run sphinx-build -b linkcheck . _build/linkcheck
